<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>组队接龙</title>
  <style>
    :root {
      --bg: #0c0c18;
      --panel: #1b1b33;
      --panel-2: #22213d;
      --line: #302f55;
      --primary: #7567ff;
      --primary-2: #5f51ee;
      --success: #10b981;
      --success-2: #059669;
      --danger: #b91c1c;
      --text: #f3f4ff;
      --muted: #8e90a8;
      --chip: #2d2d4d;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .app {
      width: min(680px, 100%);
      margin: 0 auto;
      min-height: 100vh;
      background: #111124;
      border-left: 1px solid #15152a;
      border-right: 1px solid #15152a;
    }

    header {
      padding: 36px 24px 26px;
      text-align: center;
      background: linear-gradient(180deg, #1d2748 0%, #18213d 100%);
      border-bottom: 1px solid #263056;
    }

    header h1 {
      margin: 0;
      font-size: 28px;
      letter-spacing: 1px;
    }

    header p {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 15px;
    }

    .save-row {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 8px;
      padding: 16px 22px;
      background: var(--panel-2);
      border-bottom: 1px solid var(--line);
    }

    input, textarea {
      width: 100%;
      border: 1px solid #494777;
      border-radius: 10px;
      background: #252440;
      color: var(--text);
      padding: 12px 14px;
      font-size: 15px;
      outline: none;
    }

    input:focus, textarea:focus { border-color: var(--primary); }

    button {
      border: 0;
      border-radius: 10px;
      padding: 0 20px;
      color: white;
      background: linear-gradient(180deg, var(--primary) 0%, var(--primary-2) 100%);
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      transition: transform .15s ease, opacity .15s ease;
    }

    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); opacity: .88; }
    button:disabled { cursor: not-allowed; opacity: .55; transform: none; }
    button.full { height: 50px; }

    nav {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      background: #1d1c32;
      border-bottom: 1px solid var(--line);
    }

    nav button {
      height: 56px;
      border-radius: 0;
      background: transparent;
      color: var(--muted);
      border-bottom: 3px solid transparent;
    }

    nav button.active {
      color: #a89fff;
      border-bottom-color: var(--primary);
    }

    main { padding: 18px; }

    .admin-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      margin-bottom: 18px;
    }

    .form-card, .card, .detail-card, .member-card, .back-card, .status-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 12px 32px rgba(0,0,0,.18);
    }

    .form-card {
      padding: 18px;
      display: none;
      gap: 12px;
      margin-bottom: 18px;
    }

    .form-card.show { display: grid; }

    .card {
      margin-bottom: 16px;
      cursor: pointer;
    }

    .card-body { padding: 18px 20px 14px; }

    .card h2, .detail-card h2 {
      margin: 0 0 12px;
      font-size: 20px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 5px 10px;
      border-radius: 999px;
      background: var(--chip);
      color: #aaaac0;
      font-size: 14px;
    }

    .desc {
      color: var(--muted);
      line-height: 1.6;
      margin: 0;
      padding: 12px 14px;
      border-radius: 10px;
      background: rgba(255,255,255,.045);
    }

    .card-footer {
      padding: 12px 20px;
      color: #6f718a;
      background: rgba(255,255,255,.025);
      border-top: 1px solid rgba(255,255,255,.035);
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      font-size: 14px;
    }

    .detail-card {
      padding: 22px;
      margin-bottom: 18px;
    }

    .join-primary {
      width: 100%;
      height: 70px;
      margin-bottom: 18px;
      border-radius: 16px;
      background: linear-gradient(180deg, var(--success) 0%, var(--success-2) 100%);
      box-shadow: 0 12px 30px rgba(16,185,129,.22);
      font-size: 17px;
    }

    .member-card {
      padding: 20px;
      margin-bottom: 18px;
    }

    .member-card h3 {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 17px;
    }

    .member-list {
      display: grid;
      gap: 10px;
    }

    .member-item {
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 48px;
      padding: 10px 14px;
      border-radius: 10px;
      background: rgba(255,255,255,.045);
    }

    .member-index {
      width: 28px;
      height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      background: var(--primary);
      color: #fff;
      font-weight: 700;
      flex: 0 0 auto;
    }

    .member-name { font-weight: 700; }

    .member-steam {
      color: #74768d;
      font-size: 14px;
    }

    .back-card {
      width: 100%;
      height: 58px;
      background: #282742;
      color: var(--muted);
    }

    .delete-btn {
      width: 100%;
      height: 48px;
      margin-top: 14px;
      background: var(--danger);
    }

    .empty, .status-card {
      color: var(--muted);
      text-align: center;
      padding: 48px 12px;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 28px;
      transform: translateX(-50%);
      background: #2b2a4a;
      border: 1px solid #494777;
      color: white;
      padding: 12px 18px;
      border-radius: 999px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease, bottom .2s ease;
      z-index: 99;
    }

    .toast.show { opacity: 1; bottom: 40px; }

    @media (max-width: 560px) {
      .save-row, .admin-row { grid-template-columns: 1fr; }
      .save-row button, .admin-row button { height: 46px; }
      main { padding: 14px; }
      header h1 { font-size: 24px; }
      .join-primary { height: 58px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>🎮 组队接龙</h1>
      <p>Steam游戏组队 · 随时开黑</p>
    </header>

    <section class="save-row">
      <input id="nickname" placeholder="你的昵称" />
      <input id="steamId" placeholder="Steam ID" />
      <button onclick="saveProfile()">保存</button>
    </section>

    <nav>
      <button class="active" onclick="switchTab('list', this)">📋 接龙列表</button>
      <button onclick="switchTab('create', this)">➕ 发起接龙</button>
      <button onclick="switchTab('mine', this)">🗂 我的接龙</button>
    </nav>

    <main>
      <div class="admin-row">
        <input id="adminPassword" type="password" placeholder="管理员密码" />
        <button class="full" onclick="unlockAdmin()">🔐 解锁管理</button>
      </div>

      <section id="createForm" class="form-card">
        <input id="game" placeholder="游戏名称，例如：深海迷航 2" />
        <input id="time" placeholder="开黑时间，例如：今晚任意时间" />
        <input id="limit" type="number" min="2" placeholder="人数上限，例如：4" />
        <textarea id="desc" rows="3" placeholder="备注，例如：验垃圾、尽量不跳车"></textarea>
        <button class="full" onclick="createRoom()">发布接龙</button>
      </section>

      <section id="rooms"></section>
    </main>
  </div>

  <div id="toast" class="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://pbvwxxlswivhjurjvbeq.supabase.co';
    const SUPABASE_PUBLISHABLE_KEY = 'sb_publishable_QVP6B4riaxQOmCwa_aWt6g_3jZQmn8L';

    const supabaseClient = window.supabase.createClient(
      SUPABASE_URL,
      SUPABASE_PUBLISHABLE_KEY
    );

    const ADMIN_PASSWORD = '123456';
    let isAdmin = false;
    let activeTab = 'list';
    let currentView = 'list';
    let selectedRoomId = null;
    let rooms = [];
    let isLoading = true;

    const $ = id => document.getElementById(id);

    function toast(msg) {
      const el = $('toast');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 1800);
    }

    function saveProfile() {
      localStorage.setItem('profile', JSON.stringify({
        nickname: $('nickname').value.trim(),
        steamId: $('steamId').value.trim()
      }));
      toast('已保存资料');
    }

    function loadProfile() {
      const profile = JSON.parse(localStorage.getItem('profile') || '{}');
      $('nickname').value = profile.nickname || '';
      $('steamId').value = profile.steamId || '';
    }

    function getProfile() {
      const saved = JSON.parse(localStorage.getItem('profile') || '{}');
      return {
        nickname: saved.nickname || $('nickname').value.trim(),
        steamId: saved.steamId || $('steamId').value.trim()
      };
    }

    function switchTab(tab, btn) {
      activeTab = tab;
      currentView = 'list';
      selectedRoomId = null;
      document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      $('createForm').classList.toggle('show', tab === 'create');
      render();
    }

    function unlockAdmin() {
      if ($('adminPassword').value === ADMIN_PASSWORD) {
        isAdmin = true;
        toast('管理员已解锁');
        render();
      } else {
        toast('密码错误');
      }
    }

    async function loadRooms() {
      isLoading = true;
      render();

      const { data, error } = await supabaseClient
        .from('rooms')
        .select('id, game, time, limit_count, description, created_by, created_at, members(id, nickname, steam_id, joined_at)')
        .order('created_at', { ascending: false });

      if (error) {
        console.error(error);
        isLoading = false;
        toast('读取接龙失败');
        render();
        return;
      }

      rooms = (data || []).map(room => ({
        id: room.id,
        game: room.game,
        time: room.time,
        limit: room.limit_count,
        desc: room.description || '',
        createdBy: room.created_by || '',
        createdAt: formatDate(room.created_at),
        members: (room.members || [])
          .sort((a, b) => new Date(a.joined_at) - new Date(b.joined_at))
          .map(member => ({
            id: member.id,
            nickname: member.nickname,
            steamId: member.steam_id || ''
          }))
      }));

      isLoading = false;
      render();
    }

    async function createRoom() {
      const game = $('game').value.trim();
      const time = $('time').value.trim();
      const limit = Number($('limit').value);
      const desc = $('desc').value.trim();
      const profile = getProfile();

      if (!profile.nickname) return toast('先填写昵称');
      if (!game || !time || !limit) return toast('请补全游戏、时间和人数');

      const { data: room, error: roomError } = await supabaseClient
        .from('rooms')
        .insert({
          game,
          time,
          limit_count: limit,
          description: desc,
          created_by: profile.nickname
        })
        .select('id')
        .single();

      if (roomError) {
        console.error(roomError);
        toast('发布失败');
        return;
      }

      const { error: memberError } = await supabaseClient
        .from('members')
        .insert({
          room_id: room.id,
          nickname: profile.nickname,
          steam_id: profile.steamId || null
        });

      if (memberError) {
        console.error(memberError);
        toast('房间已创建，但加入失败');
      } else {
        toast('接龙已发布');
      }

      ['game', 'time', 'limit', 'desc'].forEach(id => $(id).value = '');
      await loadRooms();
    }

    function openRoomDetail(id) {
      selectedRoomId = id;
      currentView = 'detail';
      $('createForm').classList.remove('show');
      render();
    }

    function backToList() {
      selectedRoomId = null;
      currentView = 'list';
      $('createForm').classList.toggle('show', activeTab === 'create');
      render();
    }

    async function joinRoom(id) {
      const profile = getProfile();
      if (!profile.nickname) return toast('先填写昵称');

      const room = rooms.find(r => r.id === id);
      if (!room) return toast('接龙不存在');
      if (room.members.some(m => m.nickname === profile.nickname || (profile.steamId && m.steamId === profile.steamId))) {
        return toast('你已经报名了');
      }
      if (room.members.length >= room.limit) return toast('车满了，下次请早');

      const { error } = await supabaseClient
        .from('members')
        .insert({
          room_id: id,
          nickname: profile.nickname,
          steam_id: profile.steamId || null
        });

      if (error) {
        console.error(error);
        toast(error.code === '23505' ? '你已经报名了' : '报名失败');
        return;
      }

      toast('报名成功');
      await loadRooms();
    }

    async function removeRoom(id) {
      if (!isAdmin) return;
      const { error } = await supabaseClient
        .from('rooms')
        .delete()
        .eq('id', id);

      if (error) {
        console.error(error);
        toast('删除失败');
        return;
      }

      selectedRoomId = null;
      currentView = 'list';
      toast('已删除');
      await loadRooms();
    }

    function subscribeRealtime() {
      supabaseClient
        .channel('steam-team-lobby-realtime')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'rooms' }, loadRooms)
        .on('postgres_changes', { event: '*', schema: 'public', table: 'members' }, loadRooms)
        .subscribe(status => {
          if (status === 'SUBSCRIBED') console.log('Realtime connected');
        });
    }

    function visibleRooms() {
      const profile = getProfile();
      if (activeTab === 'mine') {
        return rooms.filter(r => r.members.some(m => m.nickname === profile.nickname || (profile.steamId && m.steamId === profile.steamId)));
      }
      return rooms;
    }

    function render() {
      if (currentView === 'detail') {
        renderRoomDetail();
        return;
      }
      renderRoomList();
    }

    function renderRoomList() {
      const container = $('rooms');

      if (isLoading) {
        container.innerHTML = '<div class="status-card">正在读取接龙...</div>';
        return;
      }

      const list = visibleRooms();
      if (!list.length) {
        container.innerHTML = '<div class="empty">暂无接龙</div>';
        return;
      }

      container.innerHTML = list.map(room => {
        const full = room.members.length >= room.limit;
        return `
          <article class="card" onclick="openRoomDetail(${room.id})">
            <div class="card-body">
              <h2>${escapeHtml(room.game)}</h2>
              <div class="chips">
                <span class="chip">🕘 ${escapeHtml(room.time)}</span>
                <span class="chip">👥 ${room.members.length}人已报名</span>
                ${full ? '<span class="chip">满车</span>' : ''}
              </div>
              <p class="desc">${escapeHtml(room.desc || '无备注')}</p>
            </div>
            <div class="card-footer">
              <span>${escapeHtml(room.createdAt)}</span>
              <span>${room.members.map(m => escapeHtml(m.nickname)).join('、')}</span>
            </div>
          </article>
        `;
      }).join('');
    }

    function renderRoomDetail() {
      const room = rooms.find(r => r.id === selectedRoomId);
      const container = $('rooms');

      if (isLoading) {
        container.innerHTML = '<div class="status-card">正在读取详情...</div>';
        return;
      }

      if (!room) {
        container.innerHTML = '<div class="empty">接龙不存在</div><button class="back-card" onclick="backToList()">← 返回列表</button>';
        return;
      }

      const full = room.members.length >= room.limit;
      container.innerHTML = `
        <section class="detail-card">
          <h2>${escapeHtml(room.game)}</h2>
          <div class="chips">
            <span class="chip">🕘 ${escapeHtml(room.time)}</span>
            <span class="chip">📅 ${escapeHtml(room.createdAt)}</span>
          </div>
          <p class="desc">${escapeHtml(room.desc || '无备注')}</p>
          ${isAdmin ? `<button class="delete-btn" onclick="removeRoom(${room.id})">管理员删除接龙</button>` : ''}
        </section>

        <button class="join-primary" onclick="joinRoom(${room.id})" ${full ? 'disabled' : ''}>🎯 ${full ? '接龙已满' : '一键加入接龙'}</button>

        <section class="member-card">
          <h3>已报名 ${room.members.length} 人</h3>
          <div class="member-list">
            ${room.members.map((member, index) => `
              <div class="member-item">
                <span class="member-index">${index + 1}</span>
                <span class="member-name">${escapeHtml(member.nickname)}</span>
                <span class="member-steam">${escapeHtml(member.steamId || '未填写Steam ID')}</span>
              </div>
            `).join('')}
          </div>
        </section>

        <button class="back-card" onclick="backToList()">← 返回列表</button>
      `;
    }

    function formatDate(value) {
      if (!value) return '';
      const date = new Date(value);
      const pad = n => String(n).padStart(2, '0');
      return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}`;
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>'"]/g, s => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
      }[s]));
    }

    loadProfile();
    loadRooms();
    subscribeRealtime();
  </script>
</body>
</html>
